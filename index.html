<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#2563eb">
  <title>PDF Sign</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>

  <header class="toolbar">
    <label for="file-input" id="btn-open" class="btn-icon btn-label" title="Open PDF">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Open
    </label>
    <input type="file" id="file-input" accept=".pdf" class="file-input-hidden">

    <span id="file-name" class="file-name">No file open</span>

    <div class="toolbar-right">
      <button id="btn-signature" class="btn-secondary" disabled title="Manage signatures">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        Signature
      </button>
      <button id="btn-place-sig" class="btn-secondary" disabled title="Place signature on PDF">Place</button>
      <button id="btn-add-text"  class="btn-secondary" disabled title="Add text anywhere on the PDF">Add text</button>
      <button id="btn-save" class="btn-primary" disabled title="Save signed PDF">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Save PDF
      </button>
    </div>
  </header>

  <!-- Error banner -->
  <div id="error-banner" class="error-banner hidden" role="alert">
    <span id="error-banner-msg"></span>
    <button id="error-banner-close" class="error-banner-close" aria-label="Dismiss">&times;</button>
  </div>

  <main id="main">
    <div id="drop-zone" class="drop-zone">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="12" x2="12" y2="18"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
      <h2>Open a PDF to get started</h2>
      <p>Tap <strong>Open</strong> or drop a PDF here</p>
    </div>
    <div id="pdf-pages" class="pdf-pages hidden"></div>
  </main>

  <!-- Signature modal -->
  <div id="sig-modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Signature manager">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>Signature</h2>
        <button id="sig-modal-close" class="btn-ghost" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div class="sig-toolbar">
        <label class="label" for="sig-linewidth" style="margin-bottom:0">Width</label>
        <input type="range" id="sig-linewidth" min="1" max="12" value="2" step="0.5">
        <span id="sig-linewidth-val">2px</span>
        <label class="label" for="sig-color" style="margin-bottom:0;margin-left:10px">Color</label>
        <input type="color" id="sig-color" value="#1e293b" title="Signature color">
        <div class="color-presets">
          <button class="color-swatch" data-color="#1e293b" style="background:#1e293b" title="Black"></button>
          <button class="color-swatch" data-color="#1a237e" style="background:#1a237e" title="Dark blue"></button>
          <button class="color-swatch" data-color="#1565c0" style="background:#1565c0" title="Blue"></button>
          <button class="color-swatch" data-color="#7f0000" style="background:#7f0000" title="Dark red"></button>
        </div>
      </div>
      <div class="sig-canvas-wrapper">
        <canvas id="sig-canvas" width="600" height="180"></canvas>
      </div>
      <div class="modal-actions">
        <button id="sig-clear" class="btn-secondary">Clear</button>
        <button id="sig-save" class="btn-primary">Save Signature</button>
      </div>

      <div class="sig-import-row">
        <span class="label" style="margin-bottom:0;align-self:center">Or import</span>
        <label for="sig-png-input"  class="btn-secondary btn-label">PNG / JPG</label>
        <label for="sig-json-input" class="btn-secondary btn-label">JSON backup</label>
        <button id="sig-export" class="btn-secondary" style="margin-left:auto">Export all</button>
      </div>
      <input type="file" id="sig-png-input"  accept="image/png,image/jpeg,image/webp" class="file-input-hidden">
      <input type="file" id="sig-json-input" accept=".json"                            class="file-input-hidden">

      <div class="saved-sigs-section">
        <p class="label">Saved signatures — tap to select</p>
        <div id="saved-sigs" class="saved-sigs"></div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script type="module" src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      // Auto-reload when a new SW takes control so stale JS/CSS is never served
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) { refreshing = true; window.location.reload(); }
      });
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
