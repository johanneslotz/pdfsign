server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # correct MIME types (required for ES modules and the SW)
    include /etc/nginx/mime.types;
    types {
        application/javascript  js mjs;
        text/javascript         js;
    }

    # service worker must be served from the root scope
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # cache static assets aggressively
    location ~* \.(css|js|svg|png|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # manifest needs to be revalidated
    location = /manifest.json {
        add_header Cache-Control "no-cache";
    }

    # single-page app fallback (future-proof)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
